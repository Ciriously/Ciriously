name: Embed font
   on:
     workflow_dispatch:
   permissions:
     contents: write
   jobs:
     embed:
       runs-on: ubuntu-latest
       steps:
         - uses: actions/checkout@v4
         - run: bash embed-blackletter.sh
         - run: |
             git config user.name "github-actions"
             git config user.email "actions@users.noreply.github.com"
             git add quotes.svg
             git commit -m "Embed gothic font [skip ci]" || echo "nothing to commit"
             git push
